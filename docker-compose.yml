services:
  postgres:
    image: postgres:16-alpine
    container_name: viraza-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-viraza}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-viraza_secret}
      POSTGRES_DB: ${DB_NAME:-viraza}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
